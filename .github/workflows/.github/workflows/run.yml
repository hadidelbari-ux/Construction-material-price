name: Daily Steel Price Bot

on:
  schedule:
    - cron: '0 7 * * *'  # هر روز ساعت 7 UTC
  workflow_dispatch:     # اجرا دستی هم داشته باشد

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python main.py
